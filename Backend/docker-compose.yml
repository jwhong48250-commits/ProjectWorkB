version: "3.9"

services:
  # ── Nginx (HTTPS Reverse Proxy) ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: workb_nginx
    restart: always
    environment:
      TZ: Asia/Seoul
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    # depends_on:
    #   - certbot

  # ── Certbot (Let's Encrypt SSL) ───────────────────────
  # certbot:
  #   image: certbot/certbot
  #   container_name: workb_certbot
  #   volumes:
  #     - ./certbot/conf:/etc/letsencrypt
  #     - ./certbot/www:/var/www/certbot

  # ── MySQL ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: workb_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: meeting_assistant
      MYSQL_CHARSET: utf8mb4
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # ── MongoDB ───────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: workb_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: "1234"
      MONGO_INITDB_DATABASE: meeting_assistant
      TZ: Asia/Seoul
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: workb_redis
    restart: always
    environment:
      TZ: Asia/Seoul
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── ChromaDB ──────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: workb_chromadb
    restart: always
    environment:
      TZ: Asia/Seoul
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  chroma_data:
